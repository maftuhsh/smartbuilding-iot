<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IoT Smart Building Dashboard</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 { text-align: center; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
    }

    canvas { max-height: 200px; }

    .status { font-size: 18px; margin-top: 10px; }
    .ok { color: #22c55e; }
    .warn { color: #f59e0b; }
    .danger { color: #ef4444; }

    button, input {
      margin: 5px;
      padding: 8px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    button { background: #38bdf8; color: black; }
    button:hover { opacity: 0.8; }

    #alertBox {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #ef4444;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>

<body>

<h1>SMART BUILDING DASHBOARD</h1>

<div id="alertBox"></div>

<div class="grid">

  <div class="card">
    <h3>Temperature</h3>
    <canvas id="tempChart"></canvas>
  </div>

  <div class="card">
    <h3>Humidity</h3>
    <canvas id="humChart"></canvas>
  </div>

  <div class="card">
    <h3>Gas Level</h3>
    <canvas id="gasChart"></canvas>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="motion" class="status">--</div>
    <div id="light" class="status">--</div>
    <div id="gasText" class="status">--</div>
  </div>

  <!-- CONTROL UI -->
  <div class="card">
    <h3>Control Panel</h3>

    <button onclick="sendCommand('lamp','ON')">Lamp ON</button>
    <button onclick="sendCommand('lamp','OFF')">Lamp OFF</button>

    <br/>

    <button onclick="sendCommand('mode','AUTO')">AUTO MODE</button>
    <button onclick="sendCommand('mode','MANUAL')">MANUAL MODE</button>

    <br/>

    <label>AC Control</label>
    <input type="range" min="0" max="180" onchange="sendCommand('ac', this.value)">
  </div>

</div>

<script>

const broker = "wss://building-iot-9ee940c9.a03.euc1.aws.hivemq.cloud:8884/mqtt";

const client = mqtt.connect(broker, {
  username: "smartbuilding",
  password: "Smart123"
});

// CHART
function createChart(ctx, label) {
  return new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ label, data: [], borderColor: '#38bdf8', fill: false }] },
    options: { responsive: true, scales: { x: { display: false } } }
  });
}

const tempChart = createChart(document.getElementById('tempChart'), 'Temp');
const humChart = createChart(document.getElementById('humChart'), 'Humidity');
const gasChart = createChart(document.getElementById('gasChart'), 'Gas');

function updateChart(chart, value) {
  const t = new Date().toLocaleTimeString();
  chart.data.labels.push(t);
  chart.data.datasets[0].data.push(value);

  if (chart.data.labels.length > 20) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
}

// ALERT
function showAlert(msg) {
  const box = document.getElementById('alertBox');
  box.innerText = msg;
  box.style.display = 'block';

  setTimeout(() => box.style.display = 'none', 4000);
}

// CONTROL
function sendCommand(type, value) {
  const topic = "smartbuilding/control";
  const msg = JSON.stringify({ type, value });

  client.publish(topic, msg);
  console.log("Sent:", msg);
}

client.on('connect', () => {
  console.log('MQTT Connected');
  client.subscribe('smartbuilding/sensor');
});

client.on('message', (topic, message) => {

  const data = JSON.parse(message.toString());

  updateChart(tempChart, data.temp);
  updateChart(humChart, data.hum);
  updateChart(gasChart, data.gas);

  document.getElementById('motion').innerText = data.motion ? 'MOTION DETECTED' : 'NO MOTION';
  document.getElementById('light').innerText = data.light;

  let gasText = 'SAFE';
  let gasClass = 'ok';

  if (data.gas > 3000) {
    gasText = 'DANGER';
    gasClass = 'danger';
    showAlert('⚠ GAS DANGER! EVACUATE!');
  } else if (data.gas > 1800) {
    gasText = 'WARNING';
    gasClass = 'warn';
    showAlert('⚠ Gas Warning Level');
  }

  const gasEl = document.getElementById('gasText');
  gasEl.innerText = gasText;
  gasEl.className = 'status ' + gasClass;
});

client.on('error', (err) => console.log(err));

</script>

</body>
</html>
