<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Industrial IoT Dashboard</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2e;
      --panel2:#0f1a33;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --ok:#22c55e;
      --warn:#f59e0b;
      --danger:#ef4444;
      --border:rgba(255,255,255,0.08);
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:system-ui,Arial;
      background:radial-gradient(circle at top,#0f172a,#050814);
      color:var(--text);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 18px;
      background:rgba(17,26,46,0.75);
      border-bottom:1px solid var(--border);
      position:sticky;
      top:0;
      z-index:5;
    }

    .title{
      font-weight:700;
      letter-spacing:1px;
      font-size:14px;
    }

    .status-pill{
      padding:5px 10px;
      border-radius:999px;
      font-size:12px;
      border:1px solid var(--border);
      color:var(--ok);
    }

    .container{
      padding:16px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    @media(max-width:900px){
      .container{grid-template-columns:1fr;}
    }

    .panel{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
    }

    .panel h3{
      margin:0 0 10px 0;
      font-size:13px;
      color:var(--muted);
      letter-spacing:1px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }

    @media(max-width:900px){
      .grid{grid-template-columns:1fr;}
    }

    .card{
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px;
    }

    .label{
      font-size:11px;
      color:var(--muted);
    }

    .value{
      font-size:20px;
      font-weight:700;
      margin-top:4px;
    }

    canvas{max-height:180px;}

    .status{
      font-size:12px;
      padding:5px 8px;
      border-radius:8px;
      display:inline-block;
      margin-top:6px;
      border:1px solid var(--border);
    }

    .ok{color:var(--ok);}
    .warn{color:var(--warn);}
    .danger{color:var(--danger);}
  </style>
</head>

<body>

<div class="topbar">
  <div class="title">INDUSTRIAL IoT DASHBOARD</div>
  <div id="conn" class="status-pill">CONNECTING...</div>
</div>

<div class="container">

  <div class="panel">
    <h3>MONITORING</h3>

    <div class="grid">
      <div class="card">
        <div class="label">TEMPERATURE</div>
        <div class="value" id="tval">--</div>
        <canvas id="tempChart"></canvas>
      </div>

      <div class="card">
        <div class="label">HUMIDITY</div>
        <div class="value" id="hval">--</div>
        <canvas id="humChart"></canvas>
      </div>

      <div class="card">
        <div class="label">GAS</div>
        <div class="value" id="gval">--</div>
        <canvas id="gasChart"></canvas>
      </div>
    </div>
  </div>

  <div class="panel">
    <h3>STATUS</h3>

    <div class="card">
      <div class="label">MOTION</div>
      <div id="motion" class="status">--</div>
    </div>

    <div class="card">
      <div class="label">LIGHT</div>
      <div id="light" class="status">--</div>
    </div>

    <div class="card">
      <div class="label">GAS ALERT</div>
      <div id="gasText" class="status">--</div>
    </div>

  </div>

</div>

<script>

const broker = "wss://building-iot-9ee940c9.a03.euc1.aws.hivemq.cloud:8884/mqtt";

const client = mqtt.connect(broker, {
  username:"smartbuilding",
  password:"Smart123"
});

const conn=document.getElementById("conn");

function chart(ctx,label){
  return new Chart(ctx,{type:"line",data:{labels:[],datasets:[{label,data:[],borderColor:"#38bdf8",fill:false}]},options:{responsive:true,scales:{x:{display:false}}}});
}

const t=chart(document.getElementById("tempChart"),"T");
const h=chart(document.getElementById("humChart"),"H");
const g=chart(document.getElementById("gasChart"),"G");

function up(c,v){
  const time=new Date().toLocaleTimeString();
  c.data.labels.push(time);
  c.data.datasets[0].data.push(v);
  if(c.data.labels.length>20){c.data.labels.shift();c.data.datasets[0].data.shift();}
  c.update();
}

client.on("connect",()=>{
  conn.innerText="ONLINE";
  conn.style.color="#22c55e";
  client.subscribe("smartbuilding/sensor");
});

client.on("message",(_,m)=>{
  const d=JSON.parse(m.toString());

  document.getElementById("tval").innerText=d.temp+"°C";
  document.getElementById("hval").innerText=d.hum+"%";
  document.getElementById("gval").innerText=d.gas;

  up(t,d.temp);
  up(h,d.hum);
  up(g,d.gas);

  document.getElementById("motion").innerText=d.motion?"DETECTED":"CLEAR";
  document.getElementById("light").innerText=d.light;

  let gt="SAFE",cls="ok";

  if(d.gas>3000){gt="DANGER";cls="danger";}
  else if(d.gas>1800){gt="WARNING";cls="warn";}

  const el=document.getElementById("gasText");
  el.innerText=gt;
  el.className="status "+cls;
});

</script>

</body>
</html>
