<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IoT Smart Building Dashboard</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* ================= DESAIN BARU (TEMA PUTIH PROFESIONAL) ================= */
    :root {
      --bg-main: #f8fafc;
      --card-bg: #ffffff;
      --text-dark: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-main);
      color: var(--text-dark);
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #0f172a;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 15px;
      color: var(--text-muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .chart-wrapper {
      position: relative;
      height: 200px;
      width: 100%;
    }

    /* Container untuk Status Sensor */
    .status-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f1f5f9;
      padding: 12px 15px;
      border-radius: 8px;
    }

    .status-label {
      font-weight: 600;
      color: var(--text-dark);
    }

    /* Styling bawaan lo tetep dipake biar JS nya gak error */
    .status {
      font-size: 14px;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 20px;
      text-align: center;
      min-width: 80px;
      background: #e2e8f0; /* Default */
      color: #475569;
    }

    /* Class warna dari JS original lo (diperbagus UI-nya) */
    .ok { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
    .warn { background: #fef08a; color: #a16207; border: 1px solid #fde047; }
    .danger { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
  </style>
</head>

<body>

<h1>SMART BUILDING DASHBOARD</h1>

<div class="grid">

  <div class="card">
    <h3>Temperature (°C)</h3>
    <div class="chart-wrapper">
      <canvas id="tempChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h3>Humidity (%)</h3>
    <div class="chart-wrapper">
      <canvas id="humChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h3>Gas Level</h3>
    <div class="chart-wrapper">
      <canvas id="gasChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h3>System Status</h3>
    
    <div class="status-container">
      <div class="status-row">
        <span class="status-label">Motion Sensor</span>
        <div id="motion" class="status">--</div>
      </div>

      <div class="status-row">
        <span class="status-label">Lighting Status</span>
        <div id="light" class="status">--</div>
      </div>

      <div class="status-row">
        <span class="status-label">Gas Alert</span>
        <div id="gasText" class="status">--</div>
      </div>
    </div>
  </div>

</div>

<script>

// ================= LOGIKA ASLI LO - NO TOUCH! =================

const broker = "wss://building-iot-9ee940c9.a03.euc1.aws.hivemq.cloud:8884/mqtt";

const client = mqtt.connect(broker, {
  username: "smartbuilding",
  password: "Smart123"
});

// ================= CHART SETUP =================
const maxData = 20;

// Cuma nambahin param 'color' biar grafiknya beda warna, sisanya sama
function createChart(ctx, label, color) {
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: label,
        data: [],
        borderColor: color,
        backgroundColor: color + '33', // Efek transparan dikit
        fill: true,
        tension: 0.3,
        borderWidth: 2,
        pointRadius: 1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false, // Biar pas di dalem card
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { border: { display: false } }
      }
    }
  });
}

// Injeksi warna doang
const tempChart = createChart(document.getElementById('tempChart'), 'Temperature', '#ef4444');
const humChart = createChart(document.getElementById('humChart'), 'Humidity', '#3b82f6');
const gasChart = createChart(document.getElementById('gasChart'), 'Gas', '#8b5cf6');

function updateChart(chart, value) {
  const time = new Date().toLocaleTimeString();

  chart.data.labels.push(time);
  chart.data.datasets[0].data.push(value);

  if (chart.data.labels.length > maxData) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
}

// ================= MQTT (PERSIS KODE LO) =================
client.on('connect', () => {
  console.log('MQTT Connected');
  client.subscribe('smartbuilding/sensor');
});

client.on('message', (topic, message) => {

  const data = JSON.parse(message.toString());

  // Charts
  updateChart(tempChart, data.temp);
  updateChart(humChart, data.hum);
  updateChart(gasChart, data.gas);

  // Motion
  document.getElementById('motion').innerText = data.motion ? 'DETECTED' : 'NO MOTION';

  // Light
  document.getElementById('light').innerText = data.light;

  // Gas status
  let gasText = 'SAFE';
  let gasClass = 'ok';

  if (data.gas > 3000) {
    gasText = 'DANGER';
    gasClass = 'danger';
  } else if (data.gas > 1800) {
    gasText = 'WARNING';
    gasClass = 'warn';
  }

  const gasEl = document.getElementById('gasText');
  gasEl.innerText = gasText;
  gasEl.className = 'status ' + gasClass;

});

client.on('error', (err) => {
  console.log('MQTT Error:', err);
});

</script>

</body>
</html>
