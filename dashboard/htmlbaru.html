<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IoT Smart Building Dashboard</title>

  <!-- MQTT + Chart.js -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
    }

    canvas {
      max-height: 200px;
    }

    .status {
      font-size: 18px;
      margin-top: 10px;
    }

    .ok { color: #22c55e; }
    .warn { color: #f59e0b; }
    .danger { color: #ef4444; }
  </style>
</head>

<body>

<h1>SMART BUILDING DASHBOARD</h1>

<div class="grid">

  <div class="card">
    <h3>Temperature (°C)</h3>
    <canvas id="tempChart"></canvas>
  </div>

  <div class="card">
    <h3>Humidity (%)</h3>
    <canvas id="humChart"></canvas>
  </div>

  <div class="card">
    <h3>Gas Level</h3>
    <canvas id="gasChart"></canvas>
  </div>

  <div class="card">
    <h3>Motion Status</h3>
    <div id="motion" class="status">--</div>

    <h3>Light Status</h3>
    <div id="light" class="status">--</div>

    <h3>Gas Alert</h3>
    <div id="gasText" class="status">--</div>
  </div>

</div>

<script>

// ================= MQTT CONFIG =================
const broker = "wss://building-iot-9ee940c9.a03.euc1.aws.hivemq.cloud:8884/mqtt";

const client = mqtt.connect(broker, {
  username: "smartbuilding",
  password: "Smart123"
});

// ================= CHART SETUP =================
const maxData = 20;

function createChart(ctx, label) {
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: label,
        data: [],
        borderColor: '#38bdf8',
        fill: false
      }]
    },
    options: {
      responsive: true,
      scales: {
        x: { display: false }
      }
    }
  });
}

const tempChart = createChart(document.getElementById('tempChart'), 'Temperature');
const humChart = createChart(document.getElementById('humChart'), 'Humidity');
const gasChart = createChart(document.getElementById('gasChart'), 'Gas');

function updateChart(chart, value) {
  const time = new Date().toLocaleTimeString();

  chart.data.labels.push(time);
  chart.data.datasets[0].data.push(value);

  if (chart.data.labels.length > maxData) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
}

// ================= MQTT =================
client.on('connect', () => {
  console.log('MQTT Connected');
  client.subscribe('smartbuilding/sensor');
});

client.on('message', (topic, message) => {

  const data = JSON.parse(message.toString());

  // Charts
  updateChart(tempChart, data.temp);
  updateChart(humChart, data.hum);
  updateChart(gasChart, data.gas);

  // Motion
  document.getElementById('motion').innerText = data.motion ? 'DETECTED' : 'NO MOTION';

  // Light
  document.getElementById('light').innerText = data.light;

  // Gas status
  let gasText = 'SAFE';
  let gasClass = 'ok';

  if (data.gas > 3000) {
    gasText = 'DANGER';
    gasClass = 'danger';
  } else if (data.gas > 1800) {
    gasText = 'WARNING';
    gasClass = 'warn';
  }

  const gasEl = document.getElementById('gasText');
  gasEl.innerText = gasText;
  gasEl.className = 'status ' + gasClass;

});

client.on('error', (err) => {
  console.log('MQTT Error:', err);
});

</script>

</body>
</html>
